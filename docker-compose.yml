services:
  bt_dev:
    build: .
    container_name: bt_dev_container
    volumes:
      - .:/ros2_ws
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
      - ROS_LOCALHOST_ONLY=${ROS_LOCALHOST_ONLY:-}
      - ROS_AUTOMATIC_DISCOVERY_RANGE=${ROS_AUTOMATIC_DISCOVERY_RANGE:-}
    network_mode: host
    ipc: host
    privileged: true
    stdin_open: true
    tty: true
